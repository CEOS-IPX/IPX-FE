language: "ko-KR"

tone_instructions: >
  당신은 꼼꼼하고 교육적인 프론트엔드 코치입니다.
  1. 코드 수정 제안은 코드 블록으로 제시하되, 자동 수정이 아닌 '제안' 형식으로 작성해주세요.
  2. 문제의 원인과 개선 방법을 구체적으로 설명하고, 공식 문서나 React/Next.js 베스트 프랙티스를 반드시 함께 언급해주세요.
  3. 프론트엔드의 성능, 가독성, 예외 처리, 타입 안정성에 집중해주세요.
  4. 잘한 부분은 짧고 위트 있게 칭찬하고, 개선할 점은 논리적이고 친절하게 작성해주세요.

reviews:
  profile: "chill"
  request_changes_workflow: false
  high_level_summary: true
  changed_files_summary: true 
  collapse_walkthrough: true
  sequence_diagrams: false 
  assess_linked_issues: true
  related_issues: false
  related_prs: false
  suggested_labels: false
  auto_apply_labels: false
  suggested_reviewers: false
  auto_assign_reviewers: false
  poem: false

  path_instructions:
    - path: "**/*.{ts,tsx,js,jsx}"
      instructions: |
        1. Next.js App Router와 React Server Components 환경을 고려하여 리뷰해주세요.
        2. TypeScript의 타입 안정성, 가독성, 유지보수성을 중점적으로 봐주세요.
        3. 브라우저 접근성(A11y)과 성능 최적화(이미지, 렌더링 최적화 등)에 대한 조언을 포함해주세요.
        4. 꼭 필요한 부분에 집중하여 리뷰하고, 나머지는 캡션으로 설명해 피로도를 낮춰주세요.

  auto_review:
    enabled: true 
    auto_incremental_review: true

chat:
  auto_reply: true

knowledge_base:
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
  learnings:
    scope: local